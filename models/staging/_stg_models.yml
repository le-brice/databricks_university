version: 2

models:
  - name: stg_departments
    description: "TU/e departments and faculties. 9 academic faculties + 6 support departments."
    columns:
      - name: department_id
        description: "Primary key."
        data_tests: [not_null, unique]
      - name: department_name
        data_tests: [not_null]

  - name: stg_employees
    description: "Cleaned employee records. Used as reference for principal investigators on research projects."
    columns:
      - name: employee_id
        description: "Primary key."
        data_tests: [not_null, unique]
      - name: department_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_departments')
              field: department_id
      - name: employment_type
        data_tests:
          - accepted_values:
              values: [full_time, part_time, temporary, visiting]
      - name: hire_date
        data_tests: [not_null]

  - name: stg_research_projects
    description: "Research projects with funding details. Covers NWO, ERC, Horizon Europe, and industry partners (ASML, Philips, NXP)."
    columns:
      - name: project_id
        description: "Primary key."
        data_tests: [not_null, unique]
      - name: department_id
        data_tests:
          - relationships:
              to: ref('stg_departments')
              field: department_id
      - name: principal_investigator_id
        data_tests:
          - relationships:
              to: ref('stg_employees')
              field: employee_id
      - name: status
        data_tests:
          - accepted_values:
              values: [active, completed, pending, terminated]
      - name: grant_amount
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

  - name: stg_grant_payments
    description: "Individual grant payment disbursements against research projects."
    columns:
      - name: payment_id
        description: "Primary key."
        data_tests: [not_null, unique]
      - name: project_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_research_projects')
              field: project_id
      - name: payment_type
        data_tests:
          - accepted_values:
              values: [advance, milestone, final, overhead]
      - name: amount
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

  - name: funding_per_theme
    description: "funding summary by research theme."
    columns:
      - name: research_theme
        description: "research theme associated with the funded projects."
        data_tests: [not_null, unique]
      - name: project_count
        description: "number of funded projects in the research theme."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: total_funding_eur
        description: "total funding amount awarded to the research theme in eur."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: avg_grant_eur
        description: "average grant amount per project in the research theme in eur."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
